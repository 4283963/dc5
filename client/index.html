<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC5 - 多人像素肉鸽</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      font-family: 'Courier New', monospace;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #hp-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 200px;
      height: 20px;
      border: 2px solid #fff;
      background: #333;
    }

    #hp-fill {
      height: 100%;
      background: #4ade80;
      transition: width 0.1s;
    }

    #score {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 20px;
      text-shadow: 2px 2px 0 #000;
    }

    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      pointer-events: auto;
    }

    #start-screen h1 {
      color: #4ade80;
      font-size: 48px;
      margin-bottom: 30px;
      text-shadow: 4px 4px 0 #166534;
    }

    #start-screen input {
      padding: 12px 20px;
      font-size: 18px;
      margin-bottom: 15px;
      border: 2px solid #4ade80;
      background: #1a1a2e;
      color: #fff;
      font-family: inherit;
    }

    #start-screen button {
      padding: 12px 40px;
      font-size: 20px;
      background: #4ade80;
      color: #0f0f1a;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
    }

    #start-screen button:hover {
      background: #22c55e;
    }

    #status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #888;
      font-size: 14px;
    }

    #player-list {
      position: fixed;
      top: 60px;
      right: 20px;
      color: #fff;
      font-size: 14px;
      text-shadow: 1px 1px 0 #000;
    }
  </style>
</head>
<body>
  <div id="start-screen">
    <h1>DC5</h1>
    <input type="text" id="player-name" placeholder="输入你的名字" maxlength="12">
    <input type="text" id="room-id" placeholder="房间号 (默认 default)">
    <button id="start-btn">开始游戏</button>
  </div>

  <div id="game-container"></div>

  <div id="ui-overlay">
    <div id="hp-bar">
      <div id="hp-fill"></div>
    </div>
    <div id="score">分数: 0</div>
    <div id="player-list"></div>
  </div>

  <div id="status">连接中...</div>

  <script src="https://pixijs.download/release/pixi.min.js"></script>
  <script src="/shared/constants.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
